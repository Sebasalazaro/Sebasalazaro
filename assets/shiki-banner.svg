<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 112" width="680">
  <defs>
    <clipPath id="c1">
      <rect x="0" y="20" width="0" height="40">
        <animate attributeName="width" from="0" to="680" dur="1.2s" fill="freeze" begin="0.3s"/>
      </rect>
    </clipPath>
    <clipPath id="c2">
      <rect x="0" y="58" width="0" height="40">
        <animate attributeName="width" from="0" to="680" dur="2s" fill="freeze" begin="2.2s"/>
      </rect>
    </clipPath>
    <style>
      .t1 {
        font-family: 'Consolas', 'Menlo', 'DejaVu Sans Mono', 'Liberation Mono', 'Lucida Console', monospace;
        font-size: 22px;
        font-weight: 500;
        fill: #e6edf3;
      }
      .t2 {
        font-family: 'Consolas', 'Menlo', 'DejaVu Sans Mono', 'Liberation Mono', 'Lucida Console', monospace;
        font-size: 22px;
        font-weight: 500;
        fill: #58a6ff;
      }
      .acc { fill: #39ff14; }
      .sub {
        font-family: 'Consolas', 'Menlo', 'DejaVu Sans Mono', 'Liberation Mono', 'Lucida Console', monospace;
        font-size: 12px;
        font-weight: 400;
        fill: #58a6ff;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: fi 1s ease-in 4.2s forwards;
      }
      @keyframes fi { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="680" height="112" fill="#0d1117"/>

  <text class="t1" x="40" y="50" clip-path="url(#c1)">
    <tspan class="acc">&gt; </tspan>Welcome! I'm Sebastian.
  </text>

  <text class="t2" x="40" y="88" clip-path="url(#c2)">
    Security engineer with a developer's brain.
  </text>

  <text class="sub" x="340" y="106" text-anchor="middle">
    Security Engineer · Full-Stack Developer · AI Systems
  </text>

</svg>
